# RAG V1 docker-compose —— 5 服务基础设施层
# 来源: M0 plan 2026-06-10-rag-m0-infra.md 修复完版（含 r1/r2 全部修复）
# 服务: postgres / opensearch / tei / langfuse / minio

name: rag_v1

services:
  postgres:
    image: postgres:16-alpine
    container_name: rag_v1_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rag_app
      POSTGRES_PASSWORD: rag_app_password
      POSTGRES_DB: rag
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_app -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - rag_net
    mem_limit: 512m
    cpus: "1.0"

  opensearch:
    image: opensearchproject/opensearch:2.19
    container_name: rag_v1_opensearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      cluster.name: docker-rag-cluster
      node.name: rag-os-node-1
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - os_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=2s || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - rag_net
    mem_limit: 2g
    cpus: "2.0"

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: rag_v1_tei
    restart: unless-stopped
    ports:
      - "18080:80"
    command: --model-id BAAI/bge-m3
    environment:
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HOME: /data
      TRANSFORMERS_CACHE: /data
    volumes:
      - tei_cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - rag_net
    mem_limit: 4g
    cpus: "2.0"

  langfuse:
    image: langfuse/langfuse:2
    container_name: rag_v1_langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rag_app:rag_app_password@postgres:5432/rag
      NEXTAUTH_SECRET: dev-only-please-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      SALT: dev-only-please-change-in-production
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - rag_net
    mem_limit: 1g
    cpus: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      tei:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: rag_v1_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_admin_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rag_net
    mem_limit: 1g
    cpus: "1.0"

networks:
  rag_net:
    name: rag_v1_net
    driver: bridge

volumes:
  pg_data:
  os_data:
  tei_cache:
  minio_data:
